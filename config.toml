[settings]
urls = [
    "https://www.security-next.com/",
    "https://cybersecuritynews.com/amp/",
    "https://www.bleepingcomputer.com/",
    "https://thedfirreport.com/",
    "https://www.cisa.gov/known-exploited-vulnerabilities-catalog",
    "https://codebook.machinarecord.com/",
    "https://japan.zdnet.com/security/"
]
default_days = 2
default_summary_length = 500
default_target = "Beginner"
gemini_model = "gemini-3.1-pro-preview" 
default_gemini_model = "gemini-3.1-flash-lite-preview" # gemini_modelが使用できなかった時に使用するモデル
max_articles = 10 # 最終的に表示する記事の上限数
max_scrape_size = 20 # 一つのサイトあたりにスクレイピングしてくる記事の上限数
