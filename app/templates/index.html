<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Collector</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
        <div class="globe globe-3"></div>
    </div>

    <div class="container">
        <header>
            <h1><span class="highlight">News</span> Collector</h1>
            <p class="subtitle">AIによるニュース収集・要約ツール</p>
        </header>

        <section class="control-panel">
            <form hx-post="/collect" hx-target="#results-area" hx-indicator="#loading-indicator">
                <div class="form-group full-width">
                    <label>対象URL</label>
                    <textarea name="urls" rows="5">{{ urls }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>期間 (日)</label>
                        <input type="number" name="days" value="{{ default_days }}" min="1" max="365">
                    </div>

                    <div class="form-group">
                        <label>要約の文字数</label>
                        <input type="number" name="length" value="{{ default_summary_length }}" step="100">
                    </div>

                    <div class="form-group">
                        <label>読者ターゲット</label>
                        <select name="target">
                            <option value="初心者" {% if default_target=='Beginner' %}selected{% endif %}>初心者向け</option>
                            <option value="システム管理者" {% if default_target=='System Administrator' %}selected{% endif %}>
                                システム管理者向け</option>
                            <option value="経営層" {% if default_target=='CISO' %}selected{% endif %}>経営層・CISO向け</option>
                            <option value="研究者" {% if default_target=='Security Researcher' %}selected{% endif %}>研究者向け
                            </option>
                            <option value="一般" {% if default_target=='General' %}selected{% endif %}>一般向け</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        収集開始
                    </button>
                </div>
            </form>
        </section>

        <div id="loading-indicator" class="htmx-indicator">
            <div class="loader">
                <div class="scanner"></div>
                <div class="scanner-text">ニュースを収集中...</div>
            </div>
        </div>

        <section id="results-area">
            <!-- Results will appear here -->
            <div class="empty-state">
                <p>条件を指定して「収集開始」をクリックしてください。</p>
            </div>
        </section>
    </div>
</body>

</html>
