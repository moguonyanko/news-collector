<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecurity News Collector</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
        <div class="globe globe-3"></div>
    </div>

    <div class="container">
        <header>
            <h1><span class="highlight">Cyber</span>News Collector</h1>
            <p class="subtitle">Curated Security Intelligence powered by AI</p>
        </header>

        <section class="control-panel">
            <form hx-post="/collect" hx-target="#results-area" hx-indicator="#loading-indicator">
                <div class="form-group full-width">
                    <label>Target URLs</label>
                    <textarea name="urls" rows="5">{{ urls }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Period (Days)</label>
                        <input type="number" name="days" value="{{ default_days }}" min="1" max="365">
                    </div>
                    
                    <div class="form-group">
                        <label>Summary Length (chars)</label>
                        <input type="number" name="length" value="{{ default_summary_length }}" step="100">
                    </div>
                    
                    <div class="form-group">
                        <label>Target Audience</label>
                        <select name="genre">
                            <option value="Beginner" {% if default_genre == 'Beginner' %}selected{% endif %}>Beginner</option>
                            <option value="System Administrator" {% if default_genre == 'System Administrator' %}selected{% endif %}>System Administrator</option>
                            <option value="CISO" {% if default_genre == 'CISO' %}selected{% endif %}>CISO / Executive</option>
                            <option value="Security Researcher" {% if default_genre == 'Security Researcher' %}selected{% endif %}>Security Researcher</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        Start Collection
                    </button>
                </div>
            </form>
        </section>

        <div id="loading-indicator" class="htmx-indicator">
            <div class="loader">
                <div class="scanner"></div>
                <div class="scanner-text">Scanning Global Networks...</div>
            </div>
        </div>

        <section id="results-area">
            <!-- Results will appear here -->
            <div class="empty-state">
                <p>Ready to collect. Configure parameters above and hit Start.</p>
            </div>
        </section>
    </div>
</body>
</html>
